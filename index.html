<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tower Defense Infini</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/src/style.css">
</head>

<body>

  <canvas id="gameCanvas"></canvas>
  <div id="floatingUI"
    class="hidden absolute flex gap-2 transform -translate-x-1/2 -translate-y-[130%] pointer-events-auto z-40 transition-opacity">
  </div>

  <div id="ui" class="ui-layer flex flex-col justify-between z-50">
    <!-- Top Bar -->
    <div id="hud"
      class="hidden pointer-events-auto flex justify-between items-start p-4 bg-gradient-to-b from-black/80 to-transparent">
      <div class="flex flex-col gap-1">
        <div class="text-red-400 font-bold text-shadow text-lg">❤️ <span id="hpDisplay">20</span></div>
        <div class="text-yellow-400 font-bold text-shadow text-lg">💰 <span id="goldDisplay">150</span></div>
        <div class="text-blue-300 font-bold text-shadow text-sm">⭐ <span id="starsDisplay">0</span></div>
      </div>
      <div class="text-center">
        <div class="text-white font-bold text-xl text-shadow">Vague <span id="waveDisplay">1</span></div>
        <button id="btnNextWave"
          class="mt-2 bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-6 rounded-full shadow-[0_0_15px_rgba(37,99,235,0.6)] border border-blue-400 active:scale-95 transition-all">
          Lancer Vague
        </button>
      </div>
      <div class="flex gap-3">
        <button id="btnSpeed"
          class="bg-indigo-600/80 hover:bg-indigo-500 backdrop-blur-sm text-white font-bold h-12 w-16 rounded-full shadow-[0_0_15px_rgba(79,70,229,0.5)] border border-indigo-400/50 active:scale-95 transition-all flex items-center justify-center text-lg">⏩
          x1</button>
        <button id="btnBestiary"
          class="bg-amber-700/80 hover:bg-amber-600 backdrop-blur-sm text-white font-bold h-12 w-12 rounded-full shadow-[0_0_15px_rgba(180,83,9,0.5)] border border-amber-500/50 active:scale-95 transition-all flex items-center justify-center text-xl" title="Bestiaire">📖</button>
        <button id="btnQuit"
          class="bg-rose-600/80 hover:bg-rose-500 backdrop-blur-sm text-white font-bold h-12 w-12 rounded-full shadow-[0_0_15px_rgba(225,29,72,0.5)] border border-rose-400/50 active:scale-95 transition-all flex items-center justify-center text-xl">🏠</button>
        <button id="btnPause"
          class="bg-slate-700/80 hover:bg-slate-600 backdrop-blur-sm text-white font-bold h-12 w-12 rounded-full shadow-[0_0_15px_rgba(51,65,85,0.5)] border border-slate-500/50 active:scale-95 transition-all flex items-center justify-center text-xl">⏸️</button>
      </div>
    </div>

    <!-- Bottom Bar (Compétences) -->
    <div id="skillsBar"
      class="hidden pointer-events-auto p-4 flex justify-center gap-4 bg-gradient-to-t from-black/80 to-transparent">
      <button id="btnSkillMeteor"
        class="hidden relative w-14 h-14 bg-red-900 border-2 border-red-500 rounded-lg shadow-[0_0_20px_rgba(239,68,68,0.6)] active:scale-95 disabled:opacity-50 flex items-center justify-center text-2xl">☄️
        <div id="cdMeteor"
          class="absolute inset-0 bg-black/70 rounded-lg flex items-center justify-center text-white font-bold hidden">
        </div>
      </button>
      <button id="btnSkillHeal"
        class="hidden relative w-14 h-14 bg-green-900 border-2 border-green-500 rounded-lg shadow-[0_0_20px_rgba(34,197,94,0.6)] active:scale-95 disabled:opacity-50 flex items-center justify-center text-2xl">💖
        <div id="cdHeal"
          class="absolute inset-0 bg-black/70 rounded-lg flex items-center justify-center text-white font-bold hidden">
        </div>
      </button>
    </div>
  </div>

  <!-- Main Menu -->
  <div id="menuMain" class="ui-layer modal-bg pointer-events-auto flex flex-col items-center justify-center z-50">
    <h1
      class="text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 mb-8 text-center drop-shadow-[0_0_10px_rgba(168,85,247,0.8)]">
      TD INFINI</h1>
    <button id="btnResume"
      class="hidden w-64 mb-4 bg-gradient-to-r from-blue-500 to-cyan-600 text-white font-bold py-4 px-8 rounded-xl shadow-[0_0_20px_rgba(56,189,248,0.5)] border-2 border-blue-300 text-xl active:scale-95 transition-transform">REPRENDRE</button>
    <button id="btnPlay"
      class="w-64 mb-4 bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-bold py-4 px-8 rounded-xl shadow-[0_0_20px_rgba(16,185,129,0.5)] border-2 border-emerald-300 text-xl active:scale-95 transition-transform">NOUVELLE
      PARTIE</button>
    <button id="btnUpgrades"
      class="w-64 mb-4 bg-gradient-to-r from-purple-500 to-indigo-600 text-white font-bold py-4 px-8 rounded-xl shadow-[0_0_20px_rgba(139,92,246,0.5)] border-2 border-purple-300 text-xl active:scale-95 transition-transform">AMÉLIORATIONS</button>
    
    <div class="flex gap-4 w-64 justify-between mt-2">
      <button id="btnPremiumLab" class="flex-1 bg-fuchsia-900 border border-fuchsia-400 text-fuchsia-100 font-bold py-2 rounded-lg shadow-[0_0_10px_rgba(192,38,211,0.5)] active:scale-95">💎 Bonus</button>
      <button id="btnPrestige" class="flex-1 bg-amber-900 border border-amber-400 text-amber-100 font-bold py-2 rounded-lg shadow-[0_0_10px_rgba(245,158,11,0.5)] active:scale-95 text-xs">♻️ PRESTIGE</button>
    </div>

    <div class="flex gap-4 w-64 justify-between mt-4">
      <button id="btnLeaderboard" class="flex-1 bg-indigo-900 border border-indigo-400 text-indigo-100 font-bold py-2 rounded-lg shadow-[0_0_10px_rgba(99,102,241,0.5)] active:scale-95">🏆 Top 100</button>
      <button id="btnSettings" class="flex-1 bg-slate-800 border border-slate-400 text-slate-100 font-bold py-2 rounded-lg shadow-[0_0_10px_rgba(148,163,184,0.5)] active:scale-95">⚙️ Options</button>
    </div>

    <div class="mt-4 text-fuchsia-300 font-bold">
      <span id="gemsDisplay">0</span> 💎
    </div>

    <div id="authStatus" class="mt-4 text-slate-400 text-sm">Connexion...</div>
  </div>

  <!-- Tower Menu -->
  <div id="menuTower"
    class="hidden ui-layer modal-bg pointer-events-auto flex flex-col items-center justify-center p-4 z-50">
    <div class="bg-slate-800 border-2 border-slate-600 rounded-xl p-4 w-full max-w-sm flex flex-col gap-3 shadow-2xl">
      <div class="flex justify-between items-center border-b border-slate-600 pb-2">
        <h2 id="towerMenuTitle" class="text-xl font-bold text-white">Construire</h2>
        <button id="btnCloseTowerMenu"
          class="text-slate-400 hover:text-white text-2xl font-bold leading-none">&times;</button>
      </div>
      <div id="buildOptions" class="flex flex-col gap-2 overflow-y-auto max-h-64"></div>
      <div id="upgradeOptions" class="hidden flex flex-col gap-2 overflow-y-auto max-h-64"></div>
    </div>
  </div>

  <!-- Lab Menu -->
  <div id="menuLab"
    class="hidden ui-layer modal-bg pointer-events-auto flex flex-col items-center justify-center p-4 z-50">
    <div
      class="bg-slate-800 border-2 border-slate-600 rounded-xl p-4 w-full max-w-md h-[80vh] flex flex-col shadow-2xl relative">
      <button id="btnCloseLab"
        class="absolute top-4 right-4 text-slate-400 hover:text-white text-3xl font-bold leading-none">&times;</button>
      <h2 class="text-2xl font-bold text-purple-400 mb-2 border-b border-slate-600 pb-2">Laboratoire</h2>
      <div class="text-cyan-300 font-bold mb-4 flex justify-between"><span>Étoiles disponibles:</span><span
          id="labStars" class="text-xl text-yellow-300">0 ⭐</span></div>
      <div id="labList" class="flex-1 overflow-y-auto pr-2 flex flex-col gap-3"></div>
    </div>
  </div>

  <!-- Premium Lab Menu (Gems) -->
  <div id="menuPremium"
    class="hidden ui-layer modal-bg pointer-events-auto flex flex-col items-center justify-center p-4 z-50">
    <div class="bg-indigo-950 border-2 border-fuchsia-600 rounded-xl p-4 w-full max-w-md h-[80vh] flex flex-col shadow-[0_0_30px_rgba(192,38,211,0.3)] relative">
      <button id="btnClosePremium" class="absolute top-4 right-4 text-fuchsia-400 hover:text-white text-3xl font-bold leading-none">&times;</button>
      <h2 class="text-2xl font-bold text-fuchsia-400 mb-2 border-b border-fuchsia-800 pb-2">Artefacts Antiques</h2>
      <div class="text-fuchsia-200 font-bold mb-4 flex justify-between">
        <span>Gemmes disponibles:</span><span id="premiumGems" class="text-xl text-fuchsia-400 drop-shadow-[0_0_5px_rgba(192,38,211,0.8)]">0 💎</span>
      </div>
      <div id="premiumList" class="flex-1 overflow-y-auto pr-2 flex flex-col gap-3"></div>
    </div>
  </div>

  <!-- Settings Menu -->
  <div id="menuSettings" class="hidden ui-layer modal-bg pointer-events-auto flex flex-col items-center justify-center p-4 z-50">
    <div class="bg-slate-800 border-2 border-slate-600 rounded-xl p-6 w-full max-w-sm flex flex-col shadow-2xl relative">
      <button id="btnCloseSettings" class="absolute top-4 right-4 text-slate-400 hover:text-white text-3xl font-bold leading-none">&times;</button>
      <h2 class="text-2xl font-bold text-slate-200 mb-6 border-b border-slate-600 pb-2">Paramètres</h2>
      <div class="flex flex-col gap-4">
        <label class="flex justify-between items-center text-white cursor-pointer group">
          <span class="text-lg">🔊 Effets Sonores</span>
          <div class="relative">
            <input type="checkbox" id="toggleSfx" class="sr-only" checked>
            <div class="w-14 h-8 bg-slate-600 rounded-full transition-colors group-hover:bg-slate-500 peer-checked:bg-emerald-500 toggle-bg"></div>
            <div class="w-6 h-6 bg-white rounded-full absolute top-1 left-1 transition-transform transform peer-checked:translate-x-6 toggle-dot"></div>
          </div>
        </label>
        <label class="flex justify-between items-center text-white cursor-pointer group">
          <span class="text-lg">🎵 Musique</span>
          <div class="relative">
            <input type="checkbox" id="toggleMusic" class="sr-only" checked>
            <div class="w-14 h-8 bg-slate-600 rounded-full transition-colors group-hover:bg-slate-500 peer-checked:bg-emerald-500 toggle-bg"></div>
            <div class="w-6 h-6 bg-white rounded-full absolute top-1 left-1 transition-transform transform peer-checked:translate-x-6 toggle-dot"></div>
          </div>
        </label>
      </div>
    </div>
  </div>

  <!-- Leaderboard Menu -->
  <div id="menuLeaderboard" class="hidden ui-layer modal-bg pointer-events-auto flex flex-col items-center justify-center p-4 z-50">
    <div class="bg-slate-900 border-2 border-indigo-500 rounded-xl p-4 w-full max-w-md h-[80vh] flex flex-col shadow-[0_0_30px_rgba(99,102,241,0.3)] relative">
      <button id="btnCloseLeaderboard" class="absolute top-4 right-4 text-indigo-400 hover:text-white text-3xl font-bold leading-none">&times;</button>
      <h2 class="text-2xl font-bold text-indigo-400 mb-4 border-b border-indigo-800 pb-2 text-center flex items-center justify-center gap-2">🏆 Hall of Fame</h2>
      <div id="leaderboardList" class="flex-1 overflow-y-auto pr-2 flex flex-col gap-2">
        <div class="text-center text-slate-400 py-10">Chargement...</div>
      </div>
    </div>
  </div>

  <!-- Game Over Menu -->
  <div id="menuGameOver"
    class="hidden ui-layer modal-bg pointer-events-auto flex flex-col items-center justify-center p-4 z-50">
    <h2 class="text-5xl font-bold text-red-500 mb-4 drop-shadow-[0_0_20px_rgba(239,68,68,0.8)]">BASE DÉTRUITE</h2>
    <p class="text-xl text-white mb-2">Vous avez survécu jusqu'à la vague <span id="goWave"
        class="text-cyan-400 font-bold"></span></p>
    <p class="text-lg text-yellow-300 mb-8">Étoiles gagnées : +<span id="goStars" class="font-bold"></span> ⭐</p>
    <button id="btnReturnMain"
      class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-8 rounded-xl border border-slate-500 active:scale-95 transition-transform">Retour
      au Menu</button>
  </div>

  <!-- Bestiaire -->
  <div id="menuBestiary" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:8000; align-items:flex-start; justify-content:center; padding:1rem; pointer-events:auto; overflow-y:auto;">
    <div style="width:100%; max-width:700px; margin:0 auto; padding-bottom:2rem;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; position:sticky; top:0; background:rgba(15,23,42,0.95); padding:0.75rem 0; z-index:1;">
        <h2 style="font-size:1.8rem; font-weight:900; color:#f59e0b;">📖 Bestiaire</h2>
        <button id="btnCloseBestiary" style="background:#1e293b; border:1px solid #475569; color:#94a3b8; border-radius:0.5rem; padding:0.4rem 1rem; font-size:1.2rem; cursor:pointer;">&times;</button>
      </div>
      <div id="bestiaryList" style="display:flex; flex-direction:column; gap:1rem;"></div>
    </div>
  </div>

  <!-- Modale Roguelite (top-level pour éviter les problèmes de z-index) -->
  <div id="menuRoguelite" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; flex-direction:column; padding:1rem; pointer-events:auto;">
    <h2 style="font-size:2.5rem; font-weight:900; color:#facc15; margin-bottom:2rem; text-align:center; text-shadow:0 0 20px rgba(250,204,21,0.8);">RÉCOMPENSE DE BOSS</h2>
    <div id="rogueliteChoices" style="display:flex; flex-wrap:wrap; gap:1.5rem; width:100%; max-width:900px; justify-content:center;">
      <!-- Rempli par le JS -->
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
